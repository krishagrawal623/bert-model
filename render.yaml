services:
  - type: web
    name: sentiment-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_TOKEN
        sync: false  # Set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"
